server {
    listen 80;
    server_name your-domain.example www.your-domain.example;

    root /var/www/jt-rider-app/public;
    index index.php index.html index.htm;

    client_max_body_size 10M;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        include snippets/fastcgi-php.conf;
        fastcgi_pass unix:/run/php/php8.3-fpm.sock;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;
    }

    location ~* \.(?:css|js|jpg|jpeg|gif|png|svg|webp|ico|woff2?)$ {
        expires 7d;
        access_log off;
        add_header Cache-Control "public, max-age=604800";
    }

    location ~ /\. {
        deny all;
    }

    location ~ ^/(app|writable|tests|vendor|env|spark|composer\.(json|lock)|phpunit\.xml\.dist) {
        deny all;
    }
}
