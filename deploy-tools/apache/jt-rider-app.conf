<VirtualHost *:80>
    ServerName your-domain.example
    ServerAlias www.your-domain.example

    DocumentRoot "/var/www/jt-rider-app/public"

    <Directory "/var/www/jt-rider-app/public">
        AllowOverride All
        Require all granted
        Options FollowSymLinks
        DirectoryIndex index.php
    </Directory>

    ErrorLog ${APACHE_LOG_DIR}/jt-rider-app-error.log
    CustomLog ${APACHE_LOG_DIR}/jt-rider-app-access.log combined

    Header always set X-Frame-Options "SAMEORIGIN"
    Header always set X-Content-Type-Options "nosniff"
    Header always set Referrer-Policy "strict-origin-when-cross-origin"
</VirtualHost>
